<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITTE Mock Test Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8e8e8;
        }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* Config Screen */
        #configScreen.active {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
        }
        
        .config-container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .config-container h1 {
            font-size: 2.5rem;
            color: #1e293b;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }
        
        .form-group { margin-bottom: 3rem; }
        .form-group label {
            display: block;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1.5rem;
        }
        
        .test-type-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        
        .test-type-card {
            padding: 2rem;
            background: #f8fafc;
            border: 3px solid transparent;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .test-type-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .test-type-card.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }
        
        .test-type-card .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }
        
        .test-type-card h3 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        
        .test-type-card p {
            color: #64748b;
            font-size: 0.9rem;
        }
